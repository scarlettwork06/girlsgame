<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>еӨўе№»зІүзҙ…иЎЈж«ғ - дә’еӢ•жҸӣиЈқйҒҠжҲІ</title>
<style>
  /* --- еҹәзӨҺзүҲйқўжЁЈејҸ --- */
  body {
    background-color: #ffe5ec;
    font-family: 'Microsoft JhengHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
    user-select: none;
  }

  h1 {
    color: #ff4d6d;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }

  .game-container {
    display: flex;
    gap: 40px;
    background: #fff0f3;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
    position: relative;
    overflow: hidden;
  }

  /* --- зІүзҙ…иЎЈж«ғеҚҖ --- */
  .wardrobe-section {
    width: 320px;
    background: #ffb3c1;
    border: 4px solid #ff758f;
    border-radius: 15px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
  }

  .category-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 15px;
  }

  .category-buttons button {
    background: #fff;
    border: 2px solid #ff758f;
    color: #ff4d6d;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }

  .category-buttons button.active, .category-buttons button:hover {
    background: #ff4d6d;
    color: white;
  }

  .clothes-shelf {
    background: #fff;
    border-radius: 10px;
    padding: 15px;
    flex-grow: 1;
    min-height: 350px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    align-content: start;
  }

  /* иЎЈжңҚйҒ“е…·жЁЈејҸ (з”Ё CSS жЁЎж“¬иЎЈжңҚ) */
  .item {
    border: 2px dashed #ffb3c1;
    border-radius: 8px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    background: #fff5f7;
    transition: transform 0.2s;
  }
  .item:hover {
    transform: scale(1.05);
    border-color: #ff4d6d;
  }
  .item-name {
    font-size: 12px;
    color: #ff4d6d;
    margin-top: 5px;
    font-weight: bold;
  }

  /* --- жЁЎзү№е…’еұ•зӨәеҚҖ --- */
  .stage-section {
    width: 220px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }

  /* иӢ—жўқзҙ…й«®жЁЎзү№е…’дё»й«” */
  .model-container {
    position: relative;
    width: 160px;
    height: 420px;
    transition: transform 0.8s ease-in-out, left 0.8s ease-in-out;
    left: 0;
  }

  /* зҙ…иүІй•·й«® */
  .model-hair {
    position: absolute;
    top: 15px;
    left: 45px;
    width: 70px;
    height: 140px;
    background: #d9381e; /* дә®йә—зҙ…й«® */
    border-radius: 35px 35px 20px 20px;
    z-index: 1;
  }
  .model-hair-front {
    position: absolute;
    top: 15px;
    left: 50px;
    width: 60px;
    height: 35px;
    background: #d9381e;
    border-radius: 30px 30px 0 0;
    z-index: 3;
  }

  /* иӢ—жўқиә«жқҗ */
  .model-head {
    position: absolute;
    top: 25px;
    left: 55px;
    width: 50px;
    height: 50px;
    background: #ffd8be;
    border-radius: 50%;
    z-index: 2;
  }
  .model-body {
    position: absolute;
    top: 75px;
    left: 62px;
    width: 36px;
    height: 120px;
    background: #ffd8be;
    border-radius: 15px;
    z-index: 2;
  }
  /* иӢ—жўқи…°з·ҡиҰ–иҰәж•Ҳжһң */
  .model-body::after {
    content: '';
    position: absolute;
    top: 40px;
    left: -5px;
    width: 46px;
    height: 30px;
    /* border-radius: 50%; */
  }

  .model-legs {
    position: absolute;
    top: 190px;
    left: 65px;
    width: 30px;
    height: 180px;
    display: flex;
    justify-content: space-between;
    z-index: 2;
  }
  .leg {
    width: 12px;
    height: 100%;
    background: #ffd8be;
    border-radius: 0 0 5px 5px;
  }

  /* --- и©ҰиЎЈең–еұӨ (з©ҝеңЁжЁЎзү№е…’иә«дёҠзҡ„иЎЈжңҚ) --- */
  .worn-layer {
    position: absolute;
    z-index: 4;
    display: none;
    pointer-events: none;
  }

  /* --- йӯ”йҸЎеҚҖ --- */
  .mirror-section {
    width: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .mirror {
    width: 180px;
    height: 430px;
    background: linear-gradient(135deg, #e6f2ff 0%, #cce6ff 100%);
    border: 10px solid #ffb3c1;
    border-radius: 90px 90px 20px 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1), inset 0 0 15px rgba(255,255,255,0.6);
    position: relative;
  }

  /* йҸЎеӯҗзҷје…үзү№ж•Ҳ */
  .mirror.glowing {
    box-shadow: 0 0 30px #ff758f, inset 0 0 20px rgba(255, 255, 255, 0.8);
    border-color: #ff758f;
  }

  /* жҺ§еҲ¶жҢүйҲ• */
  .action-btn {
    margin-top: 15px;
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 10px rgba(255, 47, 110, 0.3);
    transition: all 0.2s;
  }
  .action-btn:hover {
    background: #ff758f;
    transform: translateY(-2px);
  }

  /* --- CSS иЎЈжңҚеӨ–и§ҖиЁӯиЁҲ (иЎЈж«ғиҲҮжЁЎзү№е…’е…ұз”Ё) --- */
  .shape-top-1 { width: 40px; height: 50px; background: #ff007f; border-radius: 5px 5px 0 0; }
  .shape-top-2 { width: 44px; height: 45px; background: #9b5de5; border-radius: 10px; }
  .shape-bot-1 { width: 36px; height: 70px; background: #00bbf9; border-radius: 5px; }
  .shape-bot-2 { width: 40px; height: 40px; background: #f15bb5; border-radius: 0 0 20px 20px; }
  .shape-dress-1 { width: 46px; height: 160px; background: gold; border-radius: 10px 10px 40px 40px; }
  .shape-dress-2 { width: 44px; height: 150px; background: #00f5d4; border-radius: 20px 20px 5px 5px; }

</style>
</head>
<body>

  <h1>вңЁ жҲ‘зҡ„еӨўе№»зІүзҙ…иЎЈж«Ҙ вңЁ</h1>

  <div class="game-container">
    
    <!-- 1. е·ҰеҒҙпјҡзІүзҙ…иЎЈж«ғ -->
    <div class="wardrobe-section">
      <div class="category-buttons">
        <button class="active" onclick="filterCategory('top')">дёҠиЎЈ</button>
        <button onclick="filterCategory('bottom')">иӨІеӯҗ</button>
        <button onclick="filterCategory('skirt')">иЈҷеӯҗ</button>
        <button onclick="filterCategory('dress')">зҰ®жңҚ</button>
      </div>
      
      <div class="clothes-shelf" id="shelf">
        <!-- иЎЈжңҚйҒ“е…·жңғз”ұ JS еӢ•ж…Ӣз”ҹжҲҗ -->
      </div>
    </div>

    <!-- 2. дёӯй–“пјҡжЁЎзү№е…’еұ•зӨәеҚҖ -->
    <div class="stage-section">
      <div class="model-container" id="playerModel">
        <div class="model-hair-front"></div>
        <div class="model-hair"></div>
        <div class="model-head"></div>
        <div class="model-body"></div>
        <div class="model-legs">
          <div class="leg"></div>
          <div class="leg"></div>
        </div>
        
        <!-- жЁЎзү№е…’иә«дёҠзҡ„иЎЈжңҚең–еұӨ -->
        <div id="worn-top" class="worn-layer" style="top: 75px; left: 60px;"></div>
        <div id="worn-bottom" class="worn-layer" style="top: 120px; left: 62px;"></div>
      </div>

      <button class="action-btn" id="moveBtn" onclick="toggleMirror()">рҹҸғвҖҚвҷҖпёҸ иө°еҲ°йҸЎеӯҗеүҚ</button>
    </div>

    <!-- 3. еҸіеҒҙпјҡйӯ”йҸЎеҚҖ -->
    <div class="mirror-section">
      <div class="mirror" id="magicMirror">
        <!-- жЁЎзү№е…’иө°йҒҺдҫҶжҷӮжңғе®ҡдҪҚеҲ°йҖҷиЈЎ -->
      </div>
    </div>

  </div>

<script>
  // --- иЎЈжңҚиіҮж–ҷеә« ---
  const clothesData = [
    { id: 'top1', category: 'top', name: 'жҷӮе°ҡжЎғзҙ…иғҢеҝғ', className: 'shape-top-1', offsetTop: '75px', offsetLeft: '60px' },
    { id: 'top2', category: 'top', name: 'е„Әйӣ…жөӘжј«зҙ«иЎЈ', className: 'shape-top-2', offsetTop: '75px', offsetLeft: '58px' },
    { id: 'bot1', category: 'bottom', name: 'зҺҮжҖ§еӨ©и—Қй•·иӨІ', className: 'shape-bot-1', offsetTop: '115px', offsetLeft: '62px' },
    { id: 'skirt1', category: 'skirt', name: 'дҝҸзҡ®зІүзҙ…зҹӯиЈҷ', className: 'shape-bot-2', offsetTop: '115px', offsetLeft: '60px' },
    { id: 'dress1', category: 'dress', name: 'еҘўиҸҜжҷҡе®ҙйҮ‘зҰ®жңҚ', className: 'shape-dress-1', offsetTop: '75px', offsetLeft: '57px', isFullBody: true },
    { id: 'dress2', category: 'dress', name: 'и’ӮиҠ¬еҰ®з¶ жҙӢиЈқ', className: 'shape-dress-2', offsetTop: '75px', offsetLeft: '58px', isFullBody: true }
  ];

  let currentCategory = 'top';
  let isInMirror = false;

  // --- еҲқе§ӢеҢ–пјҡжёІжҹ“иЎЈж«ғ ---
  function renderShelf() {
    const shelf = document.getElementById('shelf');
    shelf.innerHTML = '';
    
    const filtered = clothesData.filter(item => item.category === currentCategory);
    
    filtered.forEach(item => {
      const itemDiv = document.createElement('div');
      itemDiv.className = 'item';
      itemDiv.onclick = () => wearClothes(item);
      
      const shapeDiv = document.createElement('div');
      shapeDiv.className = item.className;
      
      const nameDiv = document.createElement('div');
      nameDiv.className = 'item-name';
      nameDiv.innerText = item.name;
      
      itemDiv.appendChild(shapeDiv);
      itemDiv.appendChild(nameDiv);
      shelf.appendChild(itemDiv);
    });
  }

  // --- еҲҮжҸӣиЎЈж«ғеҲҶйЎһ ---
  function filterCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.category-buttons button').forEach(btn => {
      btn.classList.remove('active');
      if(btn.innerText.includes(cat === 'top'?'иЎЈ':cat==='bottom'?'иӨІ':cat==='skirt'?'иЈҷ':'зҰ®')) {
        btn.classList.add('active');
      }
    });
    renderShelf();
  }

  // --- жҸӣиЈқйӮҸијҜ ---
  function wearClothes(item) {
    const wornTop = document.getElementById('worn-top');
    const wornBottom = document.getElementById('worn-bottom');

    if (item.isFullBody) {
      // з©ҝзҰ®жңҚ/йҖЈиә«иЈҷпјҡи„«жҺүеҺҹжң¬зҡ„дёҠиЎЈиҲҮдёӢи‘—пјҢжҸӣдёҠйҖЈиә«иЈҷ
      wornTop.className = `worn-layer ${item.className}`;
      wornTop.style.top = item.offsetTop;
      wornTop.style.offsetLeft = item.offsetLeft;
      wornTop.style.display = 'block';
      
      wornBottom.style.display = 'none'; // йҡұи—ҸдёӢи‘—
    } else if (item.category === 'top') {
      // з©ҝдёҠиЎЈпјҡеҰӮжһңжҳҜз©ҝи‘—зҰ®жңҚпјҢе…Ҳжё…з©әзҰ®жңҚ
      wornTop.className = `worn-layer ${item.className}`;
      wornTop.style.top = item.offsetTop;
      wornTop.style.left = item.offsetLeft;
      wornTop.style.display = 'block';
    } else if (item.category === 'bottom' || item.category === 'skirt') {
      // з©ҝиӨІеӯҗжҲ–иЈҷеӯҗ
      wornBottom.className = `worn-layer ${item.className}`;
      wornBottom.style.top = item.offsetTop;
      wornBottom.style.left = item.offsetLeft;
      wornBottom.style.display = 'block';
      
      // еҰӮжһңдёҠеҚҠиә«з©ҝзҡ„жҳҜйҖЈиә«еӨ§зҰ®жңҚпјҢйҳІе‘ҶжҠҠе®ғи„«жҺүд»Ҙе…ҚйҮҚз–Ҡ
      if(wornTop.className.includes('shape-dress')) {
        wornTop.style.display = 'none';
      }
    }
  }

  // --- дә’еӢ•пјҡз§»еӢ•жЁЎзү№е…’еҲ°йҸЎеӯҗеүҚ ---
  function toggleMirror() {
    const model = document.getElementById('playerModel');
    const mirror = document.getElementById('magicMirror');
    const btn = document.getElementById('moveBtn');

    if (!isInMirror) {
      // и®“жЁЎзү№е…’ж°ҙе№іж»‘еӢ•еҲ°йҸЎеӯҗеүҚж–№зҡ„дҪҚзҪ®
      model.style.transform = 'scale(0.95)'; // з…§йҸЎеӯҗзЁҚеҫ®зё®е°ҸжӣҙжңүжҷҜж·ұж„ҹ
      model.style.left = '250px'; // йҖҷиЈЎзҡ„еғҸзҙ еүӣеҘҪжңғи®“еҘ№иө°еҲ°еҸійӮҠйҸЎеӯҗдёӯеӨ®
      mirror.classList.add('glowing');
      btn.innerText = 'рҹ”ҷ еӣһеҲ°жӣҙиЎЈеҚҖ';
      isInMirror = true;
    } else {
      // иө°еӣһеҺҹдҪҚ
      model.style.transform = 'scale(1)';
      model.style.left = '0px';
      mirror.classList.remove('glowing');
      btn.innerText = 'рҹҸғвҖҚвҷҖпёҸ иө°еҲ°йҸЎеӯҗеүҚ';
      isInMirror = false;
    }
  }

  // з¶Ій Ғијүе…ҘжҷӮе…Ҳеҹ·иЎҢдёҖж¬ЎиЎЈж«ғжёІжҹ“
  renderShelf();
</script>

</body>
</html>
