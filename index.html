<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 夢幻試衣間 - 網站設計範例</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; }
        canvas { display: block; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        button {
            padding: 10px 20px;
            background-color: #f8bbd0;
            border: 2px solid #ec407a;
            color: #ec407a;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #f48fb1;
            color: white;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <button id="btnRedTops">選擇 紅髮-上衣</button>
        <button id="btnRedDresses">選擇 紅髮-禮服</button>
        <button id="btnPurpleBottoms">選擇 紫髮-下衣</button>
        <button id="btnMoveToMirror">移動到鏡子前</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/objects/Reflector.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/DragControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/GLTFLoader.js"></script>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js';
        import { Reflector } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/objects/Reflector.js';
        import { DragControls } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/DragControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer, mirrorReflector;
        let modelRed, modelPurple;
        let loader = new GLTFLoader();

        // 模擬的衣服模型容器 (真正應用中需要為每個模特兒創建衣服Mesh集合)
        let redClothesMeshGroup = new THREE.Group();
        let purpleClothesMeshGroup = new THREE.Group();

        init();
        animate();

        function init() {
            // 1. 初始化核心元素
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20); // 調整相機位置以查看場景

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0xfce4ec); // 柔和粉紅色背景
            document.body.appendChild(renderer.domElement);

            // 2. 添加燈光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 環境光
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7).normalize(); // 方向光
            scene.add(directionalLight);

            // 3. 載入資產 (以下均為佔位符代碼，您需要替換為實際的模型路徑)
            
            // --- A. 載入粉紅衣櫃模型 ---
            /*
            loader.load('path/to/your/pink_wardrobe_model.glb', (gltf) => {
                scene.add(gltf.scene);
                gltf.scene.position.y = -1;
            });
            */
            // 佔位符：創建一個簡單的粉紅框代表衣櫃
            const wBox = new THREE.Mesh(new THREE.BoxGeometry(30, 15, 5), new THREE.MeshLambertMaterial({color: 0xf8bbd0}));
            wBox.position.set(0, 6.5, -3);
            scene.add(wBox);

            // --- B. 載入紅髮苗條模特兒 (苗條、光之美少女風格) ---
            /*
            loader.load('path/to/your/model_red_girl.glb', (gltf) => {
                modelRed = gltf.scene;
                scene.add(modelRed);
                modelRed.position.set(-5, -1, 5);
                // 為紅髮模特兒添加衣服Mesh組
                modelRed.add(redClothesMeshGroup);
            });
            */
            // 佔位符：創建一個紅柱子代表紅髮模特兒
            modelRed = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 12), new THREE.MeshLambertMaterial({color: 0xef5350}));
            modelRed.position.set(-5, 6, 5);
            scene.add(modelRed);
            modelRed.add(redClothesMeshGroup); // 附屬衣服組

            // --- C. 載入紫髮苗條模特兒 ---
            /*
            loader.load('path/to/your/model_purple_girl.glb', (gltf) => {
                modelPurple = gltf.scene;
                scene.add(modelPurple);
                modelPurple.position.set(5, -1, 5);
                // 為紫髮模特兒添加衣服Mesh組
                modelPurple.add(purpleClothesMeshGroup);
            });
            */
            // 佔位符：創建一個紫柱子代表紫髮模特兒
            modelPurple = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 12), new THREE.MeshLambertMaterial({color: 0x9575cd}));
            modelPurple.position.set(5, 6, 5);
            scene.add(modelPurple);
            modelPurple.add(purpleClothesMeshGroup); // 附屬衣服組

            // --- D. 載入衣服模型集合並分類 ---
            // 您需要將每個衣服模型（glb）作為Mesh載入，並根據分類管理（Tops, Bottoms, Skirts, Dresses）

            // 4. 實現鏡子 (3D立體反射)
            // 創建一個平面，並應用 Three.js 的 Reflector 類
            const mirrorGeometry = new THREE.PlaneGeometry(10, 20); // 調整大小
            mirrorReflector = new Reflector(mirrorGeometry, {
                clipBias: 0.003,
                textureWidth: window.innerWidth * window.devicePixelRatio,
                textureHeight: window.innerHeight * window.devicePixelRatio,
                color: 0x889999, // 稍微帶點金屬色
                recursion: 1 // 設置反射層級
            });
            mirrorReflector.rotateY(Math.PI); // 轉向相機
            mirrorReflector.position.set(15, 10, -1); // 放置在衣櫃旁邊
            scene.add(mirrorReflector);

            // 5. 實現移動和鏡子互動邏輯
            // 使用 DragControls 允許用戶通過滑鼠拖拽模特兒 (此代碼為核心框架)
            const objectsToDrag = [modelRed, modelPurple];
            const dragControls = new DragControls(objectsToDrag, camera, renderer.domElement);

            dragControls.addEventListener('dragstart', function (event) {
                // 停止其他相機控制器（如果有的話）
            });

            dragControls.addEventListener('drag', function (event) {
                const object = event.object;
                // 限制在水平面移動
                object.position.y = (object === modelRed ? 6 : 6); 

                // --- 核心鏡子互動邏輯 ---
                // 檢查是否在鏡子前
                const distToMirror = Math.abs(object.position.x - mirrorReflector.position.x);
                if (distToMirror < 6 && object.position.z > -2) {
                    // 在鏡子前：背對相機
                    object.rotation.y = Math.PI; 
                } else {
                    // 不在鏡子前：面對相機
                    object.rotation.y = 0;
                }
            });

            // 6. UI 按鍵事件監聽
            document.getElementById('btnRedTops').addEventListener('click', () => changeClothing(modelRed, 'top'));
            document.getElementById('btnRedDresses').addEventListener('click', () => changeClothing(modelRed, 'dress'));
            document.getElementById('btnPurpleBottoms').addEventListener('click', () => changeClothing(modelPurple, 'bottom'));
            document.getElementById('btnMoveToMirror').addEventListener('click', moveToMirror);
        }

        // 模擬換裝函數 (真正應用中需要替換Mesh)
        function changeClothing(model, type) {
            console.log(`為模特兒：${model.uuid} 更改：${type}`);
            // 邏輯：從對應分類的衣服模型Mesh集中隨機選擇一個，並將其添加到模特兒附屬的衣服組中。
            // 這裡我們只是在控制台輸出。您需要實現更換Mesh的邏輯。
            /*
            let group = (model === modelRed) ? redClothesMeshGroup : purpleClothesMeshGroup;
            group.clear(); // 移除舊衣服
            // 載入新衣服 Mesh 並添加
            // const newClothMesh = loadMeshFor(type); 
            // group.add(newClothMesh);
            */
        }

        // 模擬將紫髮模特兒移動到鏡子前
        function moveToMirror() {
            console.log("正在移動紫髮模特兒到鏡子前...");
            // 真正的動畫邏輯可以使用 TWEEN.js 或更新位置
            modelPurple.position.set(15, 6, 5); 
            modelPurple.rotation.y = Math.PI; // 背對相機
        }

        function animate() {
            requestAnimationFrame(animate);
            // 渲染場景
            renderer.render(scene, camera);
        }

        // 處理視窗大小調整
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

    </script>
</body>
</html>
