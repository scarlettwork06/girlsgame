<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 光之美少女 · 夢幻魔法試衣間</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #ffe5ec;
    font-family: 'Microsoft JhengHei', sans-serif;
    user-select: none;
  }

  /* 載入中/錯誤安全提示 */
  #loading-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff4d6d;
    font-size: 18px;
    font-weight: bold;
    z-index: 1;
    pointer-events: none;
  }

  /* 遊戲華麗標題 */
  #title {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    color: #ff4d6d;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(255,255,255,0.9), 0 0 15px rgba(255, 77, 109, 0.4);
    z-index: 10;
  }

  /* 下方控制面板 */
  #ui-container {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.92);
    padding: 15px 25px;
    border-radius: 20px;
    box-shadow: 0 10px 35px rgba(255, 77, 109, 0.4);
    border: 3px solid #ffb3c1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
    width: 90%;
    max-width: 640px;
    box-sizing: border-box;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .label {
    font-weight: bold;
    color: #ff4d6d;
    min-width: 100px;
    font-size: 15px;
  }

  .btn-group {
    display: flex;
    gap: 6px;
    flex-grow: 1;
  }

  button {
    background: #fff;
    border: 2px solid #ff758f;
    color: #ff4d6d;
    padding: 6px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    font-size: 13px;
    flex-grow: 1;
  }

  button:hover {
    background: #ff758f;
    color: white;
    transform: translateY(-2px);
  }

  /* 核心變身按鈕 */
  .action-btn {
    background: linear-gradient(45deg, #ff4d6d, #ff758f);
    color: white;
    border: none;
    font-size: 16px;
    padding: 12px 40px;
    border-radius: 25px;
    box-shadow: 0 5px 15px rgba(255, 77, 109, 0.5);
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    width: 100%;
  }
  .action-btn:hover {
    background: linear-gradient(45deg, #ff758f, #ff4d6d);
    transform: scale(1.03) translateY(-1px);
  }
</style>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

<div id="loading-hint">💖 魔法世界加載中...（若畫面持續空白，請檢查瀏覽器 WebGL 是否開啟）</div>
<div id="title">✨ 3D 魔法光之美少女 · 夢幻試衣間 ✨</div>

<div id="ui-container">
  <div class="row">
    <div class="label">❤️ 紅髮美少女:</div>
    <div class="btn-group">
      <button onclick="changeOutfit(0, 'top')">日常上衣</button>
      <button onclick="changeOutfit(0, 'pants')">魔法長褲</button>
      <button onclick="changeOutfit(0, 'skirt')">芭蕾短裙</button>
      <button onclick="changeOutfit(0, 'dress1')">夢幻大禮服</button>
    </div>
  </div>

  <div class="row">
    <div class="label">💜 紫髮美少女:</div>
    <div class="btn-group">
      <button onclick="changeOutfit(1, 'top')">精靈上衣</button>
      <button onclick="changeOutfit(1, 'pants')">休閒長褲</button>
      <button onclick="changeOutfit(1, 'skirt')">百褶短裙</button>
      <button onclick="changeOutfit(1, 'dress2')">仙女綠禮服</button>
    </div>
  </div>

  <div class="row" style="margin-top: 5px;">
    <button class="action-btn" id="moveBtn" onclick="togglePosition()">✨ 魔法變身！帶她們去照鏡子 ✨</button>
  </div>
</div>

<script>
  // 移除載入提示
  document.getElementById('loading-hint').style.display = 'none';

  // --- 1. 初始化 3D 場景與近距離主相機 ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xfff0f3);
  const clock = new THREE.Clock(); 

  // 把相機拉近 (z=5.5)，角度調完美，確保所有物件都在畫面中央
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.8, 5.5);
  camera.lookAt(0, 1.3, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // --- 2. 夢幻柔光佈置 ---
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffe5ec, 0.8);
  dirLight.position.set(3, 8, 5);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // --- 3. 鏡子即時副相機與渲染緩衝設定 ---
  const mirrorWidth = 1.6, mirrorHeight = 3.2;
  const mirrorRenderTarget = new THREE.WebGLRenderTarget(512, 512);
  const mirrorCamera = new THREE.PerspectiveCamera(45, mirrorWidth / mirrorHeight, 0.1, 50);
  // 鏡子放在左側偏中央，所以鏡子相機放在鏡面處往右看
  mirrorCamera.position.set(-1.6, 1.4, 0.3);
  mirrorCamera.lookAt(1.5, 1.4, 0.3);

  // --- 4. 繪製 3D 夢幻場景 ---
  // 粉紅地板
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0xffe5ec, roughness: 0.6 }));
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // 【中央背景】粉紅大衣櫃
  const wardrobeGroup = new THREE.Group();
  wardrobeGroup.position.set(0.4, 0, -1.2); // 置中靠後
  const pinkMat = new THREE.MeshStandardMaterial({ color: 0xff758f, roughness: 0.5 });
  
  const wardrobeBack = new THREE.Mesh(new THREE.BoxGeometry(3.6, 4.0, 0.2), pinkMat);
  wardrobeBack.position.y = 2.0;
  wardrobeBack.castShadow = true;
  wardrobeGroup.add(wardrobeBack);

  const leftSide = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4.0, 0.8), pinkMat);
  leftSide.position.set(-1.8, 2.0, 0.4);
  const rightSide = leftSide.clone();
  rightSide.position.x = 1.8;
  wardrobeGroup.add(leftSide, rightSide);

  // 金色掛衣桿
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 3.4), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8 }));
  bar.rotation.z = Math.PI / 2;
  bar.position.set(0, 3.5, 0.4);
  wardrobeGroup.add(bar);

  // 衣櫃內的小衣架與掛衣服裝飾（分門別類感）
  const colors = [0x00f5d4, 0xf15bb5, 0x00bbf9, 0xffb703];
  for(let i = 0; i < 4; i++) {
    const hangerGroup = new THREE.Group();
    hangerGroup.position.set(-1.2 + i * 0.8, 3.4, 0.4);
    // 小衣架
    const hMesh = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.1, 4), new THREE.MeshStandardMaterial({color: 0xffffff}));
    hMesh.rotation.z = Math.PI;
    // 吊掛的小衣服幾何體
    const cMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 0.4, 16), new THREE.MeshStandardMaterial({color: colors[i], roughness:0.4}));
    cMesh.position.y = -0.25;
    hangerGroup.add(hMesh, cMesh);
    wardrobeGroup.add(hangerGroup);
  }
  scene.add(wardrobeGroup);

  // 【左側偏中】華麗魔鏡（角度微調面向中央，確保100%在螢幕內可見）
  const mirrorGroup = new THREE.Group();
  mirrorGroup.position.set(-1.6, 0, 0.3);
  mirrorGroup.rotation.y = Math.PI / 3; // 45度角朝向中央

  const mirrorFrame = new THREE.Mesh(new THREE.BoxGeometry(mirrorWidth + 0.2, mirrorHeight + 0.2, 0.1), new THREE.MeshStandardMaterial({ color: 0xffb3c1, roughness: 0.3 }));
  mirrorFrame.position.y = mirrorHeight / 2;
  mirrorGroup.add(mirrorFrame);

  const mirrorMat = new THREE.MeshBasicMaterial({ map: mirrorRenderTarget.texture });
  const mirrorMesh = new THREE.Mesh(new THREE.PlaneGeometry(mirrorWidth, mirrorHeight), mirrorMat);
  mirrorMesh.position.set(0, mirrorHeight / 2, 0.06);
  mirrorGroup.add(mirrorMesh);
  scene.add(mirrorGroup);

  // 亮晶晶魔法粒子效果
  const particleCount = 40;
  const particles = [];
  for (let i = 0; i < particleCount; i++) {
    const particle = new THREE.Mesh(
      new THREE.TetrahedronGeometry(0.05, 0), 
      new THREE.MeshBasicMaterial({ color: i % 2 === 0 ? 0xffd700 : 0xff758f, transparent: true, opacity: 0.7 })
    );
    particle.position.set((Math.random() - 0.5) * 6, Math.random() * 3.5, (Math.random() - 0.5) * 4);
    particle.userData = { speedY: 0.008 + Math.random() * 0.01, rotSpeed: 0.02 + Math.random() * 0.02 };
    scene.add(particle);
    particles.push(particle);
  }

  // --- 5. 核心：打造會呼吸、擺萌系 Pose 的光之美少女模特兒 ---

    headGroup.position.y = 1.6;

    rightEye.position.x = 0.06;

    // 頭髮與萌系頭飾蝴蝶結

    // 髮型特徵區分
    if (isLongHair) {
      const tailGeo = new THREE.ConeGeometry(0.06, 0.7, 16);
      tailGeo.translate(0, -0.35, 0); // 旋轉重心理想到頂端
      const leftTail = new THREE.Mesh(tailGeo, hairMat);
      leftTail.position.set(-0.16, 0.08, -0.08);

      modelGroup.rightTail = rightTail;

      bob.position.set(0, 0.02, 0);
      headGroup.add(bob);
      modelGroup.isShortHair = true;
    }
    modelGroup.add(headGroup);
    modelGroup.headNode = headGroup;

    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.06, 0.5, 16), bodyMat);
    torso.position.y = 1.15;
    modelGroup.add(torso);
