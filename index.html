<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>3D 魔法光之美少女 · 夢幻試衣間</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #ffe5ec;
    font-family: 'Microsoft JhengHei', sans-serif;
    user-select: none;
  }

  /* 遊戲華麗標題 */
  #title {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    color: #ff4d6d;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(255,255,255,0.9), 0 0 15px rgba(255, 77, 109, 0.4);
    z-index: 10;
  }

  /* 下方 UI 控制面板 */
  #ui-container {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.92);
    padding: 15px 25px;
    border-radius: 20px;
    box-shadow: 0 10px 35px rgba(255, 77, 109, 0.4);
    border: 3px solid #ffb3c1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
    width: 640px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .label {
    font-weight: bold;
    color: #ff4d6d;
    min-width: 100px;
    font-size: 15px;
  }

  .btn-group {
    display: flex;
    gap: 8px;
    flex-grow: 1;
  }

  button {
    background: #fff;
    border: 2px solid #ff758f;
    color: #ff4d6d;
    padding: 6px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    flex-grow: 1;
  }

  button:hover {
    background: #ff758f;
    color: white;
    transform: translateY(-2px);
  }

  /* 核心變身按鈕 */
  .action-btn {
    background: linear-gradient(45deg, #ff4d6d, #ff758f);
    color: white;
    border: none;
    font-size: 16px;
    padding: 12px 40px;
    border-radius: 25px;
    box-shadow: 0 5px 15px rgba(255, 77, 109, 0.5);
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
  }
  .action-btn:hover {
    background: linear-gradient(45deg, #ff758f, #ff4d6d);
    transform: scale(1.05) translateY(-2px);
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="title">✨ 3D 魔法光之美少女 · 夢幻試衣間 ✨</div>

<div id="ui-container">
  <div class="row">
    <div class="label">❤️ 紅髮美少女:</div>
    <div class="btn-group">
      <button onclick="changeOutfit(0, 'top')">日常上衣</button>
      <button onclick="changeOutfit(0, 'pants')">魔法長褲</button>
      <button onclick="changeOutfit(0, 'skirt')">芭蕾短裙</button>
      <button onclick="changeOutfit(0, 'dress1')">星空大禮服</button>
    </div>
  </div>

  <div class="row">
    <div class="label">💜 紫髮美少女:</div>
    <div class="btn-group">
      <button onclick="changeOutfit(1, 'top')">精靈上衣</button>
      <button onclick="changeOutfit(1, 'pants')">休閒長褲</button>
      <button onclick="changeOutfit(1, 'skirt')">百褶短裙</button>
      <button onclick="changeOutfit(1, 'dress2')">翡翠仙女裙</button>
    </div>
  </div>

  <div class="row" style="margin-top: 5px; justify-content: center;">
    <button class="action-btn" id="moveBtn" onclick="togglePosition()">✨ 魔法變身！帶她們去照鏡子 ✨</button>
  </div>
</div>

<script>
  // --- 1. 初始化 3D 場景與主相機 ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xfff0f3);
  const clock = new THREE.Clock(); 

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2.2, 8);
  camera.lookAt(0, 1.6, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // --- 2. 燈光佈置 ---
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffe5ec, 0.8);
  dirLight.position.set(5, 10, 7);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // --- 3. 鏡子即時二維副相機與渲染目標技術 ---
  const mirrorWidth = 2.6, mirrorHeight = 4.6;
  const mirrorRenderTarget = new THREE.WebGLRenderTarget(512, 512);
  const mirrorCamera = new THREE.PerspectiveCamera(45, mirrorWidth / mirrorHeight, 0.1, 100);
  mirrorCamera.position.set(4, 1.8, 0);
  mirrorCamera.lookAt(-5, 1.8, 0); // 從鏡面往舞台中央看

  // --- 4. 繪製 3D 場景物件 ---
  // 夢幻粉紅地板
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0xffe5ec, roughness: 0.5 }));
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // 3D 粉紅大衣櫃 (背景)
  const wardrobeGroup = new THREE.Group();
  wardrobeGroup.position.set(-1.6, 0, -1);
  const pinkMat = new THREE.MeshStandardMaterial({ color: 0xff758f, roughness: 0.5 });
  
  const wardrobeBack = new THREE.Mesh(new THREE.BoxGeometry(5, 5, 0.2), pinkMat);
  wardrobeBack.position.y = 2.5;
  wardrobeBack.castShadow = true;
  wardrobeGroup.add(wardrobeBack);

  const leftSide = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, 1), pinkMat);
  leftSide.position.set(-2.5, 2.5, 0.5);
  const rightSide = leftSide.clone();
  rightSide.position.x = 2.5;
  wardrobeGroup.add(leftSide, rightSide);

  const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 4.8), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8 }));
  bar.rotation.z = Math.PI / 2;
  bar.position.set(0, 4.3, 0.5);
  wardrobeGroup.add(bar);
  scene.add(wardrobeGroup);

  // 華麗魔法全身鏡 (右側)
  const mirrorGroup = new THREE.Group();
  mirrorGroup.position.set(4, 0, 0);
  mirrorGroup.rotation.y = -Math.PI / 2;

  const mirrorFrame = new THREE.Mesh(new THREE.BoxGeometry(mirrorWidth + 0.3, mirrorHeight + 0.3, 0.1), new THREE.MeshStandardMaterial({ color: 0xffb3c1, roughness: 0.3 }));
  mirrorFrame.position.y = mirrorHeight / 2;
  mirrorGroup.add(mirrorFrame);

  const mirrorMesh = new THREE.Mesh(new THREE.PlaneGeometry(mirrorWidth, mirrorHeight), new THREE.MeshBasicMaterial({ map: mirrorRenderTarget.texture }));
  mirrorMesh.position.set(0, mirrorHeight / 2, 0.06);
  mirrorGroup.add(mirrorMesh);
  scene.add(mirrorGroup);

  // --- 5. 亮晶晶魔法粒子系統 ---
  const particleCount = 50;
  const particleGeometry = new THREE.TetrahedronGeometry(0.06, 0); 
  const particles = [];

  for (let i = 0; i < particleCount; i++) {
    const pMat = new THREE.MeshBasicMaterial({
      color: i % 2 === 0 ? 0xffd700 : 0xff4d6d, 
      transparent: true,
      opacity: 0.8
    });
    const particle = new THREE.Mesh(particleGeometry, pMat);
    particle.position.set((Math.random() - 0.5) * 8, Math.random() * 4, (Math.random() - 0.5) * 4);
    particle.userData = { speedY: 0.01 + Math.random() * 0.015, rotSpeed: 0.02 + Math.random() * 0.03 };
    scene.add(particle);
    particles.push(particle);
  }

  // --- 6. 核心：建立會呼吸跳躍的光之美少女模型 ---
  const models = [];
  
  function createAnimeModel(hairColor, isLongHair) {
    const modelGroup = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffe0d0, roughness: 0.6 }); // 二次元白皙膚色
    
    // 建立頭部節點 (方便做歪頭與呼吸動畫)
    const headGroup = new THREE.Group();
    headGroup.position.y = 1.9;
    
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), bodyMat);
    headGroup.add(head);

    // 水汪汪的大動漫眼
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
    const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 16), eyeMat);
    leftEye.position.set(-0.07, 0.02, 0.18);
    leftEye.scale.set(1, 1.5, 0.5); 
    const rightEye = leftEye.clone();
    rightEye.position.x = 0.07;
    headGroup.add(leftEye, rightEye);

    // 頭頂頭髮
    const hairMat = new THREE.MeshStandardMaterial({ color: hairColor, roughness: 0.5 });
    const hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), hairMat);
    hairTop.position.set(0, 0.05, -0.02);
    headGroup.add(hairTop);

    // 萌系巨大蝴蝶結頭飾
    const bowMat = new THREE.MeshStandardMaterial({ color: 0xff4d6d, roughness: 0.4 });
    const bowL = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.18, 4), bowMat);
    bowL.rotation.z = Math.PI / 2;
    bowL.position.set(-0.08, 0.22, 0.05);
    const bowR = bowL.clone();
    bowR.rotation.z = -Math.PI / 2;
    bowR.position.x = 0.08;
    headGroup.add(bowL, bowR);

    // 依據條件繪製長髮雙馬尾或俏麗短髮
    if (isLongHair) {
      const tailGeo = new THREE.ConeGeometry(0.07, 0.8, 16);
      tailGeo.translate(0, -0.4, 0); // 將馬尾旋轉支點移至頂部
      
      const leftTail = new THREE.Mesh(tailGeo, hairMat);
      leftTail.position.set(-0.2, 0.1, -0.1);
      leftTail.rotation.z = 0.4;
      
      const rightTail = leftTail.clone();
      rightTail.position.x = 0.2;
      rightTail.rotation.z = -0.4;
      
      headGroup.add(leftTail, rightTail);
      modelGroup.leftTail = leftTail; // 儲存動畫變數
      modelGroup.rightTail = rightTail;
    } else {
      const bob = new THREE.Mesh(new THREE.SphereGeometry(0.26, 16, 16, 0, Math.PI*2, 0, Math.PI/2), hairMat);
      bob.position.set(0, 0.02, 0);
      headGroup.add(bob);
      modelGroup.isShortHair = true;
    }
    modelGroup.add(headGroup);
    modelGroup.headNode = headGroup;

    // 苗條身體與腰線
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.07, 0.6, 16), bodyMat);
    torso.position.y = 1.4;
    modelGroup.add(torso);

    // 擺出名模內八萌系長腿 Pose (不呆板)
    const legGeo = new THREE.CylinderGeometry(0.04, 0.028, 0.9, 16);
    const leftLeg = new THREE.Mesh(legGeo, bodyMat);
    leftLeg.position.set(-0.06, 0.55, 0);
    leftLeg.rotation.z = 0.05; 
    leftLeg.rotation.y = 0.1;
    
    const rightLeg = new THREE.Mesh(legGeo, bodyMat);
    rightLeg.position.set(0.06, 0.55, 0.02);
    rightLeg.rotation.z = -0.05;
    rightLeg.rotation.x = 0.1; // 右腳微向前勾
    modelGroup.add(leftLeg, rightLeg);

    // 擺出魔法少女手部 Pose (左手微微張開，右手優雅下放)
    const armGeo = new THREE.CylinderGeometry(0.025, 0.02, 0.6, 16);
    armGeo.translate(0, -0.3, 0); // 改變肩膀支點

    const leftArm = new THREE.Mesh(armGeo, bodyMat);
    leftArm.position.set(-0.14, 1.6, 0);
    leftArm.rotation.z = 0.4; 
    leftArm.rotation.x = 0.1;

    const rightArm = new THREE.Mesh(armGeo, bodyMat);
    rightArm.position.set(0.14, 1.6, 0);
    rightArm.rotation.z = -0.3; 
    rightArm.rotation.y = -0.2;

    modelGroup.add(leftArm, rightArm);
    modelGroup.leftArm = leftArm;
    modelGroup.rightArm = rightArm;

    // 獨立衣服圖層 (換裝專用)
    const clothesGroup = new THREE.Group();
    modelGroup.add(clothesGroup);
    modelGroup.clothes = clothesGroup;

    // 開啟陰影渲染
    modelGroup.traverse(child => { if (child.isMesh) child.castShadow = true; });

    scene.add(modelGroup);
    return modelGroup;
  }

  // 召喚兩位苗條魔法少女
  const model1 = createAnimeModel(0xd9381e, true);  // 模特兒 1: 紅色長髮雙馬尾
  const model2 = createAnimeModel(0x9b5de5, false); // 模特兒 2: 紫色短髮

  // 衣櫃前與鏡子前的初始站立座標
  const posWardrobe = [{ x: -0.6, z: 0.8 }, { x: 0.6, z: 0.8 }];
  const posMirror    = [{ x: 2.2, z: -0.5 }, { x: 2.2, z: 0.5 }];

  model1.position.set(posWardrobe[0].x, 0, posWardrobe[0].z);
  model2.position.set(posWardrobe[1].x, 0, posWardrobe[1].z);
  models.push(model1, model2);


  // --- 7. 3D 換裝數據生成系統 (致敬照片中的華麗拖尾裙擺) ---
  function changeOutfit(modelIndex, type) {
    const targetModel = models[modelIndex];
    // 清空舊衣服
    while(targetModel.clothes.children.length > 0){ targetModel.clothes.remove(targetModel.clothes.children[0]); }

    if (type === 'top') {
      const topGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.35, 16);
      const topMesh = new THREE.Mesh(topGeo, new THREE.MeshStandardMaterial({ color: 0x00f5d4, roughness: 0.3 }));
      topMesh.position.y = 1.45;
      targetModel.clothes.add(topMesh);
    } 
    else if (type === 'pants') {
      const pantsGroup = new THREE.Group();
      const pMat = new THREE.MeshStandardMaterial({ color: 0x00bbf9 });
      const legGeo = new THREE.CylinderGeometry(0.045, 0.035, 0.7, 16);
      const lLeg = new THREE.Mesh(legGeo, pMat); lLeg.position.set(-0.06, 0.65, 0); lLeg.rotation.z=0.05;
      const rLeg = new THREE.Mesh(legGeo, pMat); rLeg.position.set(0.06, 0.65, 0.02); rLeg.rotation.z=-0.05;
      pantsGroup.add(lLeg, rLeg);
      targetModel.clothes.add(pantsGroup);
    } 
    else if (type === 'skirt') {
      const skirtMesh = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.4, 16, 1, true), new THREE.MeshStandardMaterial({ color: 0xf15bb5, side: THREE.DoubleSide }));
      skirtMesh.position.y = 1.05;
      targetModel.clothes.add(skirtMesh);
    } 
    else if (type === 'dress1') {
      // 華麗星空大禮服 (還原照片1：粉藍漸層超長拖尾裙擺)
      const dressGroup = new THREE.Group();
      const dMat = new THREE.MeshStandardMaterial({ color: 0x224499, roughness: 0.2 });
      const overlayMat = new THREE.MeshStandardMaterial({ color: 0xff99bb, roughness: 0.4 });

      const bodice = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.4, 16), dMat);
      bodice.position.y = 1.4;
      dressGroup.add(bodice);

      const gown = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.3, 32), overlayMat);
      gown.position.y = 0.65;
      dressGroup.add(gown);

      // 極致延伸的後方超長拖尾
      const train = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.6, 32), dMat);
      train.position.set(0, 0.5, -0.5);
      train.rotation.x = 0.2;
      dressGroup.add(train);

      targetModel.clothes.add(dressGroup);
    } 
    else if (type === 'dress2') {
      // 翡翠仙女大禮服 (還原照片3：一字領澎澎袖與落地裙擺)
      const dressGroup = new THREE.Group();
      const gMat = new THREE.MeshStandardMaterial({ color: 0x73a942, roughness: 0.4 });

      const bodice = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.4, 16), gMat);
      bodice.position.y = 1.4;
      
      const lSleeve = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), gMat); lSleeve.position.set(-0.14, 1.55, 0);
      const rSleeve
